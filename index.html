<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/css/all.min.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>Counter</title>
</head>
<body>
<div class="counter">
    <h1 class="counter__title">Fancy Counter</h1>
    <span class="counter__value">0</span>
    <button class="counter__reset-button">
 <i class="fa-solid fa-arrows-rotate counter__reset-icon"></i>    </button>
    <div class="counter__buttons">
        <button class="counter__button counter__button--decrease" >
            <li class="fa soild fa-minus counter__icon counter__icon--mius"></li></button>
        <button class="counter__button counter__button--increase">
            <li class="fa soild fa-plus counter__icon counter__icon--plus"></li></button>

        </button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
